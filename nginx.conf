# /etc/nginx/sites-available/suburbanconstruction.com
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/suburbanconstruction.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name suburbanconstruction.com www.suburbanconstruction.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name suburbanconstruction.com www.suburbanconstruction.com;

    # SSL — managed by Certbot (run: sudo certbot --nginx -d suburbanconstruction.com -d www.suburbanconstruction.com)
    ssl_certificate     /etc/letsencrypt/live/suburbanconstruction.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suburbanconstruction.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → non-www (or flip this if you prefer www canonical)
    if ($host = www.suburbanconstruction.com) {
        return 301 https://suburbanconstruction.com$request_uri;
    }

    # Gzip
    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Static files — serve directly from Next.js build output, bypass Node
    location /_next/static/ {
        alias /var/www/suburban-construction-next/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public folder (images, PDFs, favicon, etc.)
    location /public/ {
        alias /var/www/suburban-construction-next/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Proxy everything else to Next.js / PM2
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
